<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulario de Cotización</title>

<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Arial', sans-serif;
    background: url('https://images.unsplash.com/photo-1557682250-870b7da9f9f3?auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
    background-size: cover;
  }

  .form-container {
    background: rgba(255, 255, 255, 0.95);
    max-width: 450px;
    margin: 60px auto;
    padding: 35px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }

  .form-container h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #333;
  }

  input[type="text"],
  input[type="email"],
  input[type="number"],
  select {
    width: 100%;
    padding: 12px 15px;
    margin: 10px 0 20px 0;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 16px;
    box-sizing: border-box;
  }

  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background-color: #1e90ff;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    background-color: #0f78d4;
  }

  label {
    font-weight: bold;
    color: #333;
  }

  #success-message {
    text-align: center;
    color: green;
    font-weight: bold;
    margin-top: 15px;
    display: none;
  }

  @media (max-width: 500px) {
    .form-container {
      margin: 30px 10px;
      padding: 25px;
    }
  }
</style>
</head>

<body>
<div class="form-container">
  <h2>Solicitar Cotización</h2>

  <!-- Formulario normal, POST al Web App -->
  <form action="https://script.google.com/macros/s/AKfycbx0zT_u1bcA_lmCwSiEmKIy8Toqq5LCr_s-DiW3xXE5Dwc__A90v0owSA1RtFnY0Oz4ww/exec" method="POST" target="_blank">
    
    <label for="cliente">Nombre del cliente</label>
    <input type="text" name="cliente" placeholder="Tu nombre" required>

    <label for="email">Correo electrónico</label>
    <input type="email" name="email" placeholder="tu@email.com" required>

    <label for="codigo">Selecciona un item</label>
    <select name="codigo" required>
      <option value="1">APLICACION DE BATERIA DE RIESGO PSICOSOCIAL</option>
      <option value="2">ANALISIS DE PUESTO DE TRABAJO</option>
    </select>

    <label for="cantidad">Cantidad</label>
    <input type="number" name="cantidad" placeholder="Cantidad" min="1" required>

    <button type="submit">Generar Cotización</button>
  </form>

  <!-- Mensaje de éxito opcional -->
  <div id="success-message">¡Tu cotización fue enviada correctamente! Revisa tu correo.</div>
</div>

<script>
  // Mostrar mensaje de éxito al enviar (opcional)
  const form = document.querySelector('form');
  const msg = document.getElementById('success-message');

  form.addEventListener('submit', () => {
    msg.style.display = 'block';
    setTimeout(() => { msg.style.display = 'none'; }, 5000);
  });
</script>
</body>
</html>
