<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulario de Cotización</title>

<style>
  /* Fondo de pantalla completo */
  body {
    margin: 0;
    padding: 0;
    font-family: 'Arial', sans-serif;
    background: url('https://images.unsplash.com/photo-1557682250-870b7da9f9f3?auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
    background-size: cover;
  }

  /* Contenedor del formulario centrado */
  .form-container {
    background: rgba(255, 255, 255, 0.95); /* Blanco semi-transparente */
    max-width: 450px;
    margin: 60px auto;
    padding: 35px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }

  .form-container h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #333;
  }

  /* Inputs y select */
  .form-container input[type="text"],
  .form-container input[type="email"],
  .form-container input[type="number"],
  .form-container select {
    width: 100%;
    padding: 12px 15px;
    margin: 10px 0 20px 0;
    border: 1px solid #ccc;
    border-radius: 8px;
    box-sizing: border-box;
    font-size: 16px;
  }

  /* Botón */
  .form-container button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background-color: #1e90ff;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
  }

  .form-container button:hover {
    background-color: #0f78d4;
  }

  /* Etiquetas */
  label {
    font-weight: bold;
    color: #333;
  }

  /* Responsive */
  @media (max-width: 500px) {
    .form-container {
      margin: 30px 10px;
      padding: 25px;
    }
  }
</style>
</head>

<body>
<div class="form-container">
  <h2>Solicitar Cotización</h2>
  <form action="https://script.google.com/macros/s/AKfycbyr8dUeWLXBCNEOMWxvHAoVHmfM2Y5iBbu3MTkz4_ZHo04jBCTGa857YlZygZd_4m0zww/exec" method="POST">
    
    <label for="cliente">Nombre del cliente</label>
    <input type="text" name="cliente" placeholder="Tu nombre" required>

    <label for="email">Correo electrónico</label>
    <input type="email" name="email" placeholder="tu@email.com" required>

    <label for="codigo">Selecciona un item</label>
    <select name="codigo" required>
      <option value="1">APLICACION DE BATERIA DE RIESGO PSICOSOCIAL - $35.000</option>
      <option value="2">ANALISIS DE PUESTO DE TRABAJO - $250.000</option>
    </select>

    <label for="cantidad">Cantidad</label>
    <input type="number" name="cantidad" placeholder="Cantidad" min="1" required>

    <button type="submit">Generar Cotización</button>
  </form>
</div>
</body>
</html>
